<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSync - Hệ thống Chịu Lỗi</title>
    <script defer src="weather_dashboard.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .dashboard {
            width: 90%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }

        #log-container {
            background: #000;
            padding: 1.5rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            height: 350px;
            overflow-y: auto;
            border: 1px solid #475569;
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 8px; border-left: 3px solid #475569; padding-left: 10px; }
        .log-success { border-color: var(--success); color: var(--success); }
        .log-error { border-color: var(--error); color: var(--error); }
        .log-warning { border-color: var(--warning); color: var(--warning); }
        .log-system { border-color: #38bdf8; color: #94a3b8; font-style: italic; }
        
        .timestamp { color: #64748b; font-size: 0.8rem; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Hệ thống quan trắc WeatherSync</h1>
        <p>Trạng thái: <span style="color: var(--success)">● Đang chạy</span></p>
        
        <div id="log-container">
            <!-- Nhật ký hệ thống sẽ hiển thị ở đây -->
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả sử dụng hàm document.write</title>
</head>
<body>
    <button onclick="a()">Kết quả</button>
    <script>
        function a() {
            document.write("<h1>Kết quả sử dụng hàm document.write()</h1>")
        };
    </script>
</body>
</html>
